name: 功能建议
description: 提议新的能力、工作流或可维护性改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 先描述用户、运维或维护场景，而不只是实现方案。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望行为、边界和完成条件。
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 主要领域
      options:
        - Agent 与会话
        - MCP 与系统感知
        - Guard、审批与风险
        - Executor 与回滚
        - Web 与 API
        - 部署与目标兼容
        - 文档与协作
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: 安全与兼容性影响
      description: 说明权限、目标绑定、数据持久化、回滚、协议和目标平台影响。
    validations:
      required: true

  - type: checkboxes
    id: invariant
    attributes:
      label: 安全约束
      options:
        - label: 该建议不依赖任意 Shell/命令执行工具。
          required: true
