name: 缺陷报告
description: 报告可复现的错误、回归或安全边界异常
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先删除日志中的密钥、Token、个人数据和敏感路径。安全漏洞不要公开提交，请使用仓库 Security 页面的私密报告入口。

  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 简要说明发生了什么。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小、可重复的步骤和输入。
      placeholder: |
        1. 启动……
        2. 请求……
        3. 观察到……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 包括提交或版本、操作系统、架构、Go/Node 版本和部署方式。
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 已脱敏证据
      description: 可附 Trace 事件类型、Task 状态、错误信息或截图；不要粘贴秘密值。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现重复报告。
          required: true
        - label: 我已从内容中移除凭据和敏感数据。
          required: true
