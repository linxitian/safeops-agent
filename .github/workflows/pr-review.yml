name: PR Automated Review

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  guardrails:
    name: Repository safety guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Block arbitrary command capability surfaces
        run: |
          set -euo pipefail
          if git grep -n -E '(shell\.execute|terminal\.run|command\.execute|bash\.run)' -- '*.go' '*.ts' '*.tsx' '*.yaml' '*.yml' ':!**/*_test.go' ':!internal/guard/static.go' ':!internal/benchmark/safety.go' ':!.github/workflows/**'; then
            echo "Forbidden arbitrary command capability surface found outside tests/docs."
            exit 1
          fi

      - name: Block shell command dispatch in product code
        run: |
          set -euo pipefail
          if git grep -n -E '(^|[^[:alnum:]_])(sh|bash)[[:space:]]+-c([^[:alnum:]_]|$)' -- '*.go' '*.ts' '*.tsx' '*.yaml' '*.yml' ':!**/*_test.go' ':!.github/workflows/**'; then
            echo "Forbidden sh -c or bash -c dispatch found in product code."
            exit 1
          fi

      - name: Require target verification to stay evidence-bounded
        run: |
          set -euo pipefail
          if git grep -n -E 'TargetVerified:[[:space:]]*true|target_verified:[[:space:]]*true|"target_verified"[[:space:]]*:[[:space:]]*true' -- '*.go' '*.json' '*.yaml' '*.yml' ':!**/*_test.go' ':!.github/workflows/**'; then
            echo "Target verification must not be hard-coded true by CI or local reports."
            exit 1
          fi

  go-packages:
    name: Go package tests and vet
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test every Go package independently
        run: |
          set -euo pipefail
          go list ./... > "$RUNNER_TEMP/go-packages.txt"
          while IFS= read -r package; do
            echo "::group::go test ${package}"
            go test -count=1 "${package}"
            echo "::endgroup::"
          done < "$RUNNER_TEMP/go-packages.txt"

      - name: Run Go vet across all packages
        run: go vet ./...

  frontend:
    name: Frontend tests, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Run TypeScript lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  benchmark:
    name: Benchmark evidence gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run all benchmark suites
        run: |
          set -euo pipefail
          go run ./cmd/safeops-bench all \
            --policy ./policies/tools.yaml \
            --output-dir "$RUNNER_TEMP/benchmark"

  cross-build:
    name: Cross-build linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - loong64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build all commands for target architecture
        run: ./scripts/check-cross-build.sh "${{ matrix.goarch }}"

  review-summary:
    name: PR review summary
    runs-on: ubuntu-latest
    needs:
      - guardrails
      - go-packages
      - frontend
      - benchmark
      - cross-build
    if: always()
    steps:
      - name: Publish review summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          # SafeOps PR automated review

          | Gate | Result |
          |---|---:|
          | Repository safety guardrails | `${{ needs.guardrails.result }}` |
          | Go package tests and vet | `${{ needs.go-packages.result }}` |
          | Frontend tests, lint, and build | `${{ needs.frontend.result }}` |
          | Benchmark evidence gate | `${{ needs.benchmark.result }}` |
          | Cross-build linux/amd64 and linux/loong64 | `${{ needs.cross-build.result }}` |

          Target compatibility remains evidence-bounded: this workflow does not promote any result to TARGET_VERIFIED.
          SUMMARY
          if [[ "${{ needs.guardrails.result }}" != "success" || "${{ needs.go-packages.result }}" != "success" || "${{ needs.frontend.result }}" != "success" || "${{ needs.benchmark.result }}" != "success" || "${{ needs.cross-build.result }}" != "success" ]]; then
            exit 1
          fi
